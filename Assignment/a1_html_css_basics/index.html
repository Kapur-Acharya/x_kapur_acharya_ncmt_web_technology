<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectIB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <!-- This is a heading section  -->
    <header>
         <!-- Navigation Bar -->
        <nav>
            <div class="nav-logo">ConnectIB</div>
            <div class="nav-items">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Contact</a></li>
                    <li><a href="#">About</a></li>
                    <li><button>Log In</button></li> <!-- fixed: button inside li -->
                </ul>
            </div>
        </nav>
    </header>
    <!-- This is Main section  -->
    <main>
        <section>

            <!-- Registration Form -->
            <form action="submit">
                <label for="username">Username</label>
                <input id="username" type="text" placeholder="Username" required>

                <label for="email">Email address</label>
                <input id="email" type="email" placeholder="valid email address" required>

                <label for="dob">Date of birth</label>
                <input id="dob" type="date" required>

                <label for="range">Select a range</label>
                <input id="range" type="range">

                <label for="color">Choose your favourite color</label>
                <input id="color" type="color">

                <label for="phone">Phone number</label>
                <input id="phone" type="tel" pattern="^[0-9]{10}$" placeholder="10-digit number" required>

                <button type="submit">Submit</button>
            </form>
             <!-- this is an image section  -->
            <div class="dog-section">
                <figure>
                    <img src="images/dogimage.jpg" alt="A cute small white dog">
                    <figcaption>A cute small white dog</figcaption>
                </figure>

                <article>
                    <h2>Meet the White Fluffy Dog</h2>
                    <p>
                        Lorem ipsum dolor sit amet consectetur adipisicing elit. Iure ea ptas corporis omnis odit qui! Soluta reiciendis voluptate deleniti saepe optio aperiam iste iusto. Quibusdam voluptatum incidunt laborum fugiat dolorem ut!
                    </p>
                </article>
            </div>

        </section>
    </main>

</body>
</html>
